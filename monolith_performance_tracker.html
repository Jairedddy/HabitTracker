                                        <span className="font-['Space_Grotesk'] text-xl font-bold text-primary">{meal.cal}</span>
                                        <span className="font-['Inter'] text-[10px] text-secondary ml-1">KCAL</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        };

        const History = () => {
            const [expandedDay, setExpandedDay] = useState("OCT 24");

            const days = [
                { date: "OCT 25", score: "75", icons: ['fitness_center', 'water_drop', 'menu_book', 'bedtime_off'] },
                { 
                    date: "OCT 24", score: "100", 
                    icons: ['fitness_center', 'water_drop', 'menu_book', 'bedtime', 'code'],
                    expanded: true
                },
                { date: "OCT 23", score: "92", icons: ['fitness_center', 'water_drop_off', 'menu_book', 'bedtime'] },
                { date: "OCT 22", score: "00", icons: ['fitness_center_off', 'water_drop_off', 'menu_book_off', 'bedtime_off'], error: true },
                { date: "OCT 21", score: "100", icons: ['fitness_center', 'water_drop', 'menu_book', 'bedtime'] },
            ];

            return (
                <div className="pt-24 px-6 max-w-2xl mx-auto pb-32">
                    <section className="mb-12">
                        <p className="font-['Inter'] text-[10px] font-bold tracking-[0.1em] uppercase text-secondary mb-2">PERFORMANCE LOG</p>
                        <div className="flex justify-between items-end">
                            <h2 className="font-['Space_Grotesk'] text-4xl font-bold tracking-tight text-white">HISTORY</h2>
                            <div className="text-right">
                                <p className="font-['Inter'] text-[10px] font-bold tracking-[0.1em] uppercase text-white/60">30 DAY AVG</p>
                                <p className="font-['Space_Grotesk'] text-2xl font-bold text-white">88<span className="text-secondary text-sm ml-1">%</span></p>
                            </div>
                        </div>
                    </section>

                    <div className="space-y-4">
                        {days.map((day) => (
                            day.date === expandedDay ? (
                                <div key={day.date} className="bg-surface-container-high border border-outline-variant/10 p-5 rounded-lg space-y-6">
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-6">
                                            <span className="font-['Space_Grotesk'] text-lg font-bold text-white w-14">{day.date}</span>
                                            <div className="flex gap-2">
                                                {day.icons.map((icon, i) => (
                                                    <span key={i} className="material-symbols-outlined text-white text-lg" style={{ fontVariationSettings: "'FILL' 1" }}>{icon.replace('_off', '')}</span>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-white text-black px-3 py-1 rounded text-sm font-bold font-['Space_Grotesk']">
                                            {day.score}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4 border-t border-outline-variant/20">
                                        <div className="space-y-3">
                                            <p className="font-['Inter'] text-[10px] font-bold tracking-[0.1em] uppercase text-secondary">HABIT BREAKDOWN</p>
                                            <ul className="space-y-3">
                                                {['Weight Training', '3L Hydration', 'Deep Work (4h)', 'No Screen > 10PM'].map((habit, i) => (
                                                    <li key={i} className="flex items-center justify-between group">
                                                        <span className="text-sm font-medium text-on-surface">{habit}</span>
                                                        <span className="material-symbols-outlined text-white" style={{ fontVariationSettings: "'FILL' 1" }}>check_circle</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                        <div className="space-y-3">
                                            <p className="font-['Inter'] text-[10px] font-bold tracking-[0.1em] uppercase text-secondary">DAILY NOTE</p>
                                            <p className="text-sm italic text-secondary leading-relaxed">
                                                "High energy today. Hit a new PR on deadlifts. Mental clarity is peak after the morning cold plunge. Zero friction in the workflow."
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div key={day.date} onClick={() => setExpandedDay(day.date)} className="bg-surface-container-low p-4 rounded-lg flex items-center justify-between group cursor-pointer hover:bg-surface-container-high transition-colors">
                                    <div className="flex items-center gap-6">
                                        <span className="font-['Space_Grotesk'] text-lg font-medium text-white w-14">{day.date}</span>
                                        <div className="flex gap-2">
                                            {day.icons.map((icon, i) => {
                                                const isActive = !icon.includes('_off');
                                                const iconName = icon.replace('_off', '');
                                                return (
                                                    <span key={i} className={`material-symbols-outlined text-lg ${isActive ? 'text-white' : 'text-neutral-600'}`} style={isActive ? { fontVariationSettings: "'FILL' 1" } : {}}>
                                                        {iconName}
                                                    </span>
                                                )
                                            })}
                                        </div>
                                    </div>
                                    <div className={day.error ? "bg-error-container/20 text-error px-3 py-1 rounded text-sm font-bold font-['Space_Grotesk']" : "bg-surface-container-highest px-3 py-1 rounded text-sm font-bold font-['Space_Grotesk'] text-white"}>
                                        {day.score}
                                    </div>
                                </div>
                            )
                        ))}
                    </div>
                </div>
            );
        };

        const Stats = () => {
            return (
                <div className="pt-24 px-6 max-w-2xl mx-auto pb-32 space-y-12">
                    <section>
                        <h2 className="font-headline text-5xl font-bold tracking-tighter text-white">PERFORMANCE</h2>
                        <p className="font-body italic text-secondary text-sm mt-2">Analyzing the architecture of your discipline.</p>
                    </section>

                    <section className="grid grid-cols-3 gap-3">
                        <div className="bg-surface-container-high p-4 flex flex-col justify-between h-32 rounded-lg">
                            <span className="text-[10px] font-bold tracking-[0.1em] text-secondary uppercase font-label">AVG SCORE</span>
                            <span className="font-headline text-4xl font-bold text-white">88</span>
                        </div>
                        <div className="bg-surface-container-high p-4 flex flex-col justify-between h-32 rounded-lg">
                            <span className="text-[10px] font-bold tracking-[0.1em] text-secondary uppercase font-label">BEST DAY</span>
                            <span className="font-headline text-4xl font-bold text-white">100</span>
                        </div>
                        <div className="bg-surface-container-high p-4 flex flex-col justify-between h-32 rounded-lg">
                            <span className="text-[10px] font-bold tracking-[0.1em] text-secondary uppercase font-label">WORST DAY</span>
                            <span className="font-headline text-4xl font-bold text-error">42</span>
                        </div>
                    </section>

                    <section className="space-y-6">
                        <div className="flex justify-between items-end">
                            <h3 className="text-[10px] font-bold tracking-[0.1em] text-secondary uppercase font-label">LAST 7 DAYS</h3>
                            <span className="text-[10px] font-medium text-outline uppercase font-label">Mar 01 — Mar 07</span>
                        </div>
                        <div className="space-y-4">
                            {[
                                { day: 'MON', w: '92%', c: 'bg-white', val: '92' },
                                { day: 'TUE', w: '88%', c: 'bg-white', val: '88' },
                                { day: 'WED', w: '65%', c: 'bg-orange-400', val: '65' },
                                { day: 'THU', w: '100%', c: 'bg-white', val: '100' },
                                { day: 'FRI', w: '42%', c: 'bg-error', val: '42' },
                                { day: 'SAT', w: '85%', c: 'bg-white', val: '85' },
                                { day: 'SUN', w: '95%', c: 'bg-white', val: '95' },
                            ].map((d, i) => (
                                <div key={i} className="group flex items-center gap-4">
                                    <span className="w-8 text-[10px] font-bold text-outline font-label">{d.day}</span>
                                    <div className="flex-1 h-3 bg-surface-container-lowest rounded-full overflow-hidden">
                                        <div className={`h-full ${d.c}`} style={{ width: d.w }}></div>
                                    </div>
                                    <span className="w-8 text-right font-headline text-xs text-white">{d.val}</span>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section className="space-y-6">
                        <h3 className="text-[10px] font-bold tracking-[0.1em] text-secondary uppercase font-label">HABIT EFFICIENCY</h3>
                        <div className="space-y-8">
                            {[
                                { name: 'Deep Work (4hrs)', w: '85%' },
                                { name: 'Resistance Training', w: '92%' },
                                { name: 'Cold Exposure', w: '64%' },
                            ].map((h, i) => (
                                <div key={i} className="space-y-2">
                                    <div className="flex justify-between items-end">
                                        <span className="text-sm font-medium text-white">{h.name}</span>
                                        <span className="font-headline text-lg font-bold text-white">{h.w}</span>
                                    </div>
                                    <div className="h-[2px] w-full bg-surface-container-low">
                                        <div className="h-full bg-white" style={{ width: h.w }}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        };

        const App = () => {
            return (
                <MemoryRouter>
                    <div className="min-h-screen bg-background">
                        <TopAppBar />
                        <Routes>
                            <Route path="/" element={<Home />} />
                            <Route path="/workout" element={<Workout />} />
                            <Route path="/calories" element={<Calories />} />
                            <Route path="/history" element={<History />} />
                            <Route path="/stats" element={<Stats />} />
                        </Routes>
                        <BottomNavBar />
                    </div>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
